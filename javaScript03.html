<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplos de javaScript</title>
</head>
<body>
    <h1>pasagem de parâmetro</h1>
    <p id="teste">ola mundo</p>
    <button onclick="verde()">verde</button>
    <button onclick="vermelho()">vermelho</button>

    
    <script>
        function verde() {
document.getElementById('teste').style.color = 'green';
        }
        function vermelho(){
document.getElementById('teste').style.color = 'red';
        }
    </script>
</body>
</html>
