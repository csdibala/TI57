
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato - Tradutor Burocrático</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
background:#f5f7fa;
}

.contato-header{
background:#295a9b;
color:white;
padding:60px;
text-align:center;
}

.card-contato{
border:none;
border-radius:15px;
box-shadow:0px 4px 15px rgba(0,0,0,0.1);
}

.info-icon{
font-size:30px;
color:#295a9b;
}

.btn-enviar{
background:#295a9b;
border:none;
padding:12px;
font-weight:bold;
}

.btn-enviar:hover{
background:#295a9b;
}

</style>

</head>
<body>

<!-- HEADER -->

<div class="contato-header">
<h1>Entre em Contato</h1>
<p>Precisa de ajuda com traduções de documentos? Fale conosco.</p>
</div>

<!-- CONTEÚDO -->

<div class="container mt-5 mb-5">

<div class="row">

<!-- FORMULÁRIO -->

<div class="col-md-7">

<div class="card card-contato p-4">

<h3 class="mb-4">Envie uma mensagem</h3>

<form>

<div class="mb-3">
<label class="form-label">Nome</label>
<input type="text" class="form-control" placeholder="Seu nome">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="seuemail@email.com">
</div>

<div class="mb-3">
<label class="form-label">Telefone</label>
<input type="tel" class="form-control" placeholder="(11) 99999-9999">
</div>

<div class="mb-3">
<label class="form-label">Tipo de Tradução</label>

<select class="form-select">
<option>Selecione</option>
<option>Certidão</option>
<option>Documento Jurídico</option>
<option>Documento Acadêmico</option>
<option>Contrato</option>
<option>Outro</option>
</select>

</div>

<div class="mb-3">
<label class="form-label">Mensagem</label>
<textarea class="form-control" rows="5" placeholder="Explique sua necessidade de tradução..."></textarea>
</div>

<button type="submit" class="btn btn-primary btn-enviar w-100">
Enviar Mensagem
</button>

</form>

</div>

</div>

<!-- INFORMAÇÕES -->

<div class="col-md-5">

<div class="card card-contato p-4 mb-4 text-center">

<i class="bi bi-envelope info-icon"></i>

<h5 class="mt-3">Email</h5>

<p>contato@tradutorburocratico.com</p>

</div>


<div class="card card-contato p-4 mb-4 text-center">

<i class="bi bi-telephone info-icon"></i>

<h5 class="mt-3">Telefone</h5>

<p>(11) 90000-0000</p>

</div>


<div class="card card-contato p-4 text-center">

<i class="bi bi-geo-alt info-icon"></i>

<h5 class="mt-3">Localização</h5>

<p>São Paulo - SP<br>
Atendimento Online</p>

</div>

</div>

</div>

</div>

<!-- FOOTER -->

<footer class="bg-dark text-white text-center p-3">

<p class="mb-0">
© 2026 Tradutor Burocrático - Todos os direitos reservados
</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
