<!DOCTYPE html>
<html lang="br-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplos de javaScript</title>
</head>
<body>
    <h1>mensagens via JavaScript</h1>
    <h2>via inserção</h2>
    <p id="msg01"></p>
    <button onclick="document.getElementById('msg01').innerText='Mensagem inserida via javascript!'">Inserir Mensagem</button>

<h2>via alerta</h2>
<button onclick="alert('mensagem exibida via alerta')">Exibir alerta</button>

<h2>via console</h2>
<button onclick="console.log('mensagem exibida via console!')">Exibir no console</button>

<h2>via escrita direta</h2>
<button onclick="document.write('mensagem escrita diretamente via JavaScript')">Escrita diretamente</button>

<h2>via prompt</h2>
<button onclick="prompt('Digite uma mensagem')">Exibir prompt</button>

<h1>Variáveis em JavaScript</h1>
<button onclick="mensagem()">Exibir variáveis</button>
<script>
    function mensagem(){
    var nome;
        nome = prompt('digite seu nome:');
        alert ("vai se lascar " + nome + " !");
    }
</script>


</body>
</html>
